<!-- 🟦 STATS CARDS (TOP) -->
<div class="dashboard">

    <div class="dash-card">
        <h3>Total</h3>
        <p id="total">0</p>
    </div>

    <div class="dash-card">
        <h3>Pending</h3>
        <p id="pending">0</p>
    </div>

    <div class="dash-card">
        <h3>Resolved</h3>
        <p id="resolved">0</p>
    </div>

</div>

<!-- 📊 CHARTS SIDE BY SIDE -->
<div class="chart-container">

    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>

</div>
